name: Build Native Desktop Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: PalworldDexHelper-macOS-native
          - os: windows-latest
            artifact_name: PalworldDexHelper-Windows-native

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-native.txt

      - name: Generate base dex data
        run: python build_data.py

      - name: Build native package
        run: python build_native.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-native/**
          if-no-files-found: error
