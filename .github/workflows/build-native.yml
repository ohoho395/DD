name: Build Native Desktop Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: PalworldDexHelper-macOS-native
          - os: windows-latest
            artifact_name: PalworldDexHelper-Windows-native

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-native.txt

      - name: Generate base dex data
        run: python build_data.py

      - name: Build native package
        run: python build_native.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-native/**
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: PalworldDexHelper-macOS-native
          path: release-artifacts/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PalworldDexHelper-Windows-native
          path: release-artifacts/windows

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp release-artifacts/macos/PalworldDexHelper.zip release-assets/PalworldDexHelper-macOS-native.zip
          cp release-artifacts/windows/PalworldDexHelper.zip release-assets/PalworldDexHelper-Windows-native.zip

      - name: Move latest-build tag to current commit
        run: |
          git tag -f latest-build "${GITHUB_SHA}"
          git push origin refs/tags/latest-build --force

      - name: Publish rolling prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: Latest Build
          prerelease: true
          overwrite_files: true
          generate_release_notes: true
          files: |
            release-assets/PalworldDexHelper-macOS-native.zip
            release-assets/PalworldDexHelper-Windows-native.zip
          body: |
            自动更新的桌面构建包。

            - 分支：`${{ github.ref_name }}`
            - 提交：`${{ github.sha }}`
            - 运行：`${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
